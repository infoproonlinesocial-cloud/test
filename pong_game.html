<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pong Game</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    #gameContainer {
      position: relative;
    }

    canvas {
      background: #111;
      border: 2px solid white;
      display: block;
    }

    #score {
      position: absolute;
      top: -40px;
      width: 100%;
      text-align: center;
      font-size: 24px;
    }

    #instructions {
      position: absolute;
      bottom: -60px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>

<div id="gameContainer">
  <div id="score">0 : 0</div>
  <canvas id="pong" width="800" height="400"></canvas>
  <div id="instructions">
    Player: W/S keys | AI opponent on right
  </div>
</div>

<script>
const canvas = document.getElementById("pong");
const ctx = canvas.getContext("2d");
const scoreDisplay = document.getElementById("score");

// Game objects
const paddleWidth = 10;
const paddleHeight = 80;

const player = {
  x: 10,
  y: canvas.height / 2 - paddleHeight / 2,
  width: paddleWidth,
  height: paddleHeight,
  score: 0,
  speed: 6
};

const ai = {
  x: canvas.width - paddleWidth - 10,
  y: canvas.height / 2 - paddleHeight / 2,
  width: paddleWidth,
  height: paddleHeight,
  score: 0,
  speed: 4
};

const ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  radius: 8,
  speed: 5,
  velocityX: 5,
  velocityY: 3
};

// Keyboard input
const keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Draw functions
function drawRect(x, y, w, h) {
  ctx.fillStyle = "white";
  ctx.fillRect(x, y, w, h);
}

function drawCircle(x, y, r) {
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.closePath();
  ctx.fill();
}

function drawNet() {
  for (let i = 0; i < canvas.height; i += 15) {
    drawRect(canvas.width / 2 - 1, i, 2, 10);
  }
}

// Reset ball
function resetBall() {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.velocityX = -ball.velocityX;
  ball.speed = 5;
}

// Collision detection
function collision(b, p) {
  return b.x - b.radius < p.x + p.width &&
         b.x + b.radius > p.x &&
         b.y - b.radius < p.y + p.height &&
         b.y + b.radius > p.y;
}

// Update game
function update() {

  // Player movement
  if (keys['w'] && player.y > 0) player.y -= player.speed;
  if (keys['s'] && player.y + player.height < canvas.height) player.y += player.speed;

  // AI movement
  const aiCenter = ai.y + ai.height / 2;
  if (aiCenter < ball.y - 10) ai.y += ai.speed;
  else if (aiCenter > ball.y + 10) ai.y -= ai.speed;

  // Ball movement
  ball.x += ball.velocityX;
  ball.y += ball.velocityY;

  // Wall collision
  if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
    ball.velocityY = -ball.velocityY;
  }

  // Paddle collision
  let paddle = ball.x < canvas.width / 2 ? player : ai;

  if (collision(ball, paddle)) {

    let collidePoint = ball.y - (paddle.y + paddle.height / 2);
    collidePoint = collidePoint / (paddle.height / 2);

    let angleRad = collidePoint * Math.PI / 4;

    let direction = ball.x < canvas.width / 2 ? 1 : -1;

    ball.velocityX = direction * ball.speed * Math.cos(angleRad);
    ball.velocityY = ball.speed * Math.sin(angleRad);

    ball.speed += 0.5;
  }

  // Score
  if (ball.x - ball.radius < 0) {
    ai.score++;
    resetBall();
  }

  if (ball.x + ball.radius > canvas.width) {
    player.score++;
    resetBall();
  }

  scoreDisplay.textContent = `${player.score} : ${ai.score}`;
}

// Render
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawNet();
  drawRect(player.x, player.y, player.width, player.height);
  drawRect(ai.x, ai.y, ai.width, ai.height);
  drawCircle(ball.x, ball.y, ball.radius);
}

// Game loop
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// Start game
gameLoop();

</script>

</body>
</html>
